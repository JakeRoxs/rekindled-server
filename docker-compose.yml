services:
  dsos-server-ds3:
    image: jakeroxs/ds3os:latest        # For Dark Souls 3 server
    container_name: dsos-server-ds3
    ports:
      - "50000:50000/udp"   # auth
      - "50010:50010/udp"   # game
      - "50050:50050/udp"   # login
      - "50005:50005"     # admin WebUI
    volumes:
      - ./Saved-ds3:/opt/ds3os/Saved
    # Optional environment variables (override values from config.json):
    # environment:
    #   # Master server listing (defaults to dsos.jakesws.xyz:50020)
    #   - MASTER_SERVER_IP=dsos-master
    #   - MASTER_SERVER_PORT=50020
    #
    #   # Server settings
    #   - SERVER_NAME=My Server
    #   - SERVER_DESCRIPTION=A custom Dark Souls server
    #   - SERVER_HOSTNAME=example.com
    #   - SERVER_PRIVATE_HOSTNAME=192.168.1.100
    #
    #   # Behavior toggles
    #   - QUIET_LOGGING=false
    #   - ADVERTISE=true
    #   - ADVERTISE_HEARTBEAT_TIME=30
    #   - SUPPORT_SHARDING=true
    #
    #   # Access control / mods
    #   - PASSWORD=secret
    #   - MODS_WHITELIST=mod1,mod2
    #   - MODS_BLACKLIST=mod3
    #   - MODS_REQUIRED_LIST=mod1,mod2
    #
    #   # Ports (These override internal server ports; prefer using the ports: section for mapping to host)
    #   - LOGIN_SERVER_PORT=50050
    #   - AUTH_SERVER_PORT=50060
    #   - GAME_SERVER_PORT=50010
    #   - WEBUI_SERVER_PORT=50005
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL","curl -fsS http://localhost:50005/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  dsos-server-ds2:                   # For Dark Souls 2 server
    image: jakeroxs/ds2os:latest
    container_name: dsos-server-ds2
    ports:
      - "51000:50000/udp"   # auth
      - "51010:50010/udp"   # game
      - "51050:50050/udp"   # login
      - "51005:50005"       # admin WebUI
    volumes:
      - ./Saved-ds2:/opt/ds2os/Saved
    # Optional environment variables (override values from config.json):
    # environment:
    #   # Master server listing (defaults to dsos.jakesws.xyz:50020)
    #   - MASTER_SERVER_IP=dsos-master
    #   - MASTER_SERVER_PORT=50020
    #
    #   # Server settings
    #   - SERVER_NAME=My Server
    #   - SERVER_DESCRIPTION=A custom Dark Souls server
    #   - SERVER_HOSTNAME=example.com
    #   - SERVER_PRIVATE_HOSTNAME=192.168.1.100
    #
    #   # Behavior toggles
    #   - QUIET_LOGGING=false
    #   - ADVERTISE=true
    #   - ADVERTISE_HEARTBEAT_TIME=30
    #   - SUPPORT_SHARDING=true
    #
    #   # Access control / mods
    #   - PASSWORD=secret
    #   - MODS_WHITELIST=mod1,mod2
    #   - MODS_BLACKLIST=mod3
    #   - MODS_REQUIRED_LIST=mod1,mod2
    #
    #   # Ports (These override internal server ports; prefer using the ports: section for mapping to host)
    #   - LOGIN_SERVER_PORT=50050
    #   - AUTH_SERVER_PORT=50060
    #   - GAME_SERVER_PORT=50010
    #   - WEBUI_SERVER_PORT=50005
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL","curl -fsS http://localhost:50005/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  # dsos-master:                      # Uncomment if you need a standalone master server
  #   image: jakeroxs/dsos-master:latest
  #   container_name: dsos-master
  #   ports:
  #     - "50020:50020"
  #   environment:
  #     # Optional overrides for master server settings (defaults are in config.json):
  #     - SHARDING_ALLOWLIST=192.168.1.50,192.168.1.51
  #     - MASTER_SERVER_PORT=50020
  #     - MASTER_SERVER_TIMEOUT_MS=240000
  #   restart: unless-stopped
  #   healthcheck:
  #     test: ["CMD-SHELL","curl -fsS http://localhost:50020/api/v1/servers || exit 1"]
  #     interval: 30s
  #     timeout: 5s
  #     retries: 3
  # By default the master server is disabled since most users just run the game server
  # Uncomment the above block or create a separate compose file if you want to host
  # a public/master service alongside dsos-server.
