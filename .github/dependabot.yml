# Dependabot configuration for automated dependency updates
# Documentation: https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  - package-ecosystem: "github-actions" # update workflows and actions used by GitHub Actions
    directory: "/" # workflows are in the repo root under .github/workflows
    schedule:
      interval: "weekly"
    # group multiple action updates into a single pull request
    groups:
      github-actions:
        patterns:
          - "actions/*"
          - "docker://*"
          - "*"

  # Enable version updates for .NET/NuGet dependencies
  - package-ecosystem: "nuget"
    # Look for any .csproj or .sln files in the repo
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      nuget:
        patterns:
          - "*"

  # Enable version updates for the MasterServer JavaScript dependencies
  - package-ecosystem: "npm"
    directory: "/Source/MasterServer"
    schedule:
      interval: "weekly"
    groups:
      npm:
        patterns:
          - "*"

  # Enable version updates for Docker (base images referenced in Dockerfile/docker-compose)
  # Note: GitHub Actions `docker://...` images are handled by the `github-actions` ecosystem group above.
  - package-ecosystem: "docker"
    # Look for a `Dockerfile` in the `root` directory
    directory: "/"
    # Check for updates once a week
    schedule:
      interval: "weekly"
    groups:
      docker:
        patterns:
          - "*"