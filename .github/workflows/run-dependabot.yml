# Manual workflow to trigger Dependabot update run immediately
# This can be invoked via the Actions tab using the "Run workflow" button.

name: "Force Dependabot Run"

on:
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: "Trigger Dependabot"
        uses: actions/github-script@v8
        with:
          script: |
            await github.request("POST /repos/{owner}/{repo}/dependabot/updates", {
              owner: context.repo.owner,
              repo: context.repo.repo
            });
          github-token: ${{ secrets.GITHUB_TOKEN }}
