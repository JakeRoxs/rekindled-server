name: CI

on:
  workflow_dispatch:
  push:
  pull_request:

env:
  # Path to the solution file relative to the root of the project.
  SOLUTION_FILE_PATH: ./intermediate/vs2022/ds3os.sln

  # Configuration type to build.
  # You can convert this to a build matrix if you need coverage of multiple configuration types.
  # https://docs.github.com/actions/learn-github-actions/managing-complex-workflows#using-a-build-matrix
  BUILD_CONFIGURATION: Release

jobs:
  build:
    name: Build (matrix)
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: windows
          - os: ubuntu-latest
            platform: linux
    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
      with:
        submodules: recursive

    - name: Cache build artifacts
      uses: actions/cache@v5
      with:
        path: |
          **/intermediate
          ~/.nuget/packages
        key: ${{ runner.os }}-build-${{ hashFiles('**/*.csproj','**/CMakeLists.txt') }}
        restore-keys: |
          ${{ runner.os }}-build-

    - name: Generate Solution (Windows)
      if: matrix.platform == 'windows'
      shell: cmd
      run: |
        cd "%GITHUB_WORKSPACE%\Tools"
        "%GITHUB_WORKSPACE%\Tools\generate_vs2022.bat"

    - name: Generate Solution (Linux)
      if: matrix.platform == 'linux'
      shell: bash
      run: |
        cd "${{ github.workspace }}/Tools"
        "${{ github.workspace }}/Tools/generate_make_release.sh"

    - name: Add MSBuild to PATH
      if: matrix.platform == 'windows'
      uses: microsoft/setup-msbuild@v2

    - name: Build on Windows
      if: matrix.platform == 'windows'
      working-directory: ${{github.workspace}}
      run: msbuild /m /p:Configuration=${{env.BUILD_CONFIGURATION}} ${{env.SOLUTION_FILE_PATH}} /t:Restore,Build

    - name: Install uuid development package
      if: matrix.platform == 'linux'
      run: |
        set -euxo pipefail
        sudo apt-get update
        sudo apt-get install -y uuid-dev || sudo apt-get install -y libuuid-dev

    - name: Build on Linux
      if: matrix.platform == 'linux'
      working-directory: ${{github.workspace}}/intermediate/make
      run: make -j$(nproc)

  build-nix-gcc:
    name: Build nix w/ gcc
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: DeterminateSystems/nix-installer-action@main
    - uses: DeterminateSystems/magic-nix-cache-action@main
      with:
        use-flakehub: false
    - run: nix build -L .

  build-nix-clang:
    name: Build nix w/ clang
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: DeterminateSystems/nix-installer-action@main
    - uses: DeterminateSystems/magic-nix-cache-action@main
      with:
        use-flakehub: false
    - run: nix build -L .#clang
