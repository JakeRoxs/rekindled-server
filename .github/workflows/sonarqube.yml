name: SonarQube analysis

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch name that triggered analysis from upstream workflow"
        required: false
        default: "main"

permissions:
  pull-requests: read

jobs:
  build:
    name: Build and analyze
    runs-on: ubuntu-latest

    steps:
      - name: Show dispatch tracing info
        run: |
          echo "Triggered on ref: ${{ github.ref }}"
          echo "Requested branch input: ${{ github.event.inputs.branch }}"

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build build-essential pkg-config libsqlite3-dev libssl-dev uuid-dev

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: "8.0.x"

      - name: Install SonarScanner for .NET
        run: |
          dotnet tool install --global dotnet-sonarscanner
          echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

      - name: Configure CMake (generates compile_commands.json)
        run: |
          mkdir -p build
          cmake -B build -G Ninja -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: SonarScanner begin
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          SONAR_PROJECT_KEY: ${{ vars.SONAR_PROJECT_KEY }}
        run: |
          dotnet sonarscanner begin \
            /k:"$SONAR_PROJECT_KEY" \
            /n:"dsos" \
            /d:sonar.host.url="$SONAR_HOST_URL" \
            /d:sonar.token="$SONAR_TOKEN" \
            /d:sonar.cxx.file.suffixes=.cpp,.c,.h,.hpp,.cxx,.cc \
            /d:sonar.scanner.scanAll=true \
            /d:sonar.sources=. \
            /d:sonar.exclusions="Source/ThirdParty/**,Protobuf/**,build/**,**/*.java" \
            /d:sonar.cfamily.compile-commands="build/compile_commands.json" \
            /d:sonar.cfamily.threads=4 \
            /d:sonar.sourceEncoding=UTF-8 \
            /d:sonar.cs.opencover.reportsPaths="**/coverage.opencover.xml" \
            /d:sonar.verbose=true

      - name: Build .NET project (for C# analysis)
        run: |
          dotnet build Source/Loader/Loader.csproj -c Release /p:EnableWindowsTargeting=true

      - name: SonarScanner end
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          dotnet sonarscanner end /d:sonar.token="$SONAR_TOKEN"
