name: SonarQube analysis

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch name that triggered analysis from upstream workflow"
        required: false
        default: "main"

permissions:
  pull-requests: read

jobs:
  sonar-loader:
    name: SonarQube Loader (C#)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: "8.0.x"

      - name: Restore Loader projects
        run: |
          dotnet restore Source/Loader/Loader.csproj -p:EnableWindowsTargeting=true
          dotnet restore Source/Loader.Tests/Loader.Tests.csproj -p:EnableWindowsTargeting=true

      - name: Install SonarScanner for .NET
        run: |
          dotnet tool install --global dotnet-sonarscanner --version 5.13.0
          echo "$HOME/.dotnet/tools" >> "$GITHUB_PATH"

      - name: Run SonarScanner (Loader C#)
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: |
          dotnet sonarscanner begin \
            /k:"${{ vars.SONAR_LOADER_PROJECT_KEY }}" \
            /n:"rekindled-server-loader" \
            /d:sonar.host.url="${{ secrets.SONAR_HOST_URL }}" \
            /d:sonar.login="${{ secrets.SONAR_TOKEN }}" \
            /d:sonar.sources="Source/Loader,Source/Loader.Tests" \
            /d:sonar.exclusions="Source/ThirdParty/**,Protobuf/**,build/**" \
            /d:sonar.sourceEncoding="UTF-8"
          dotnet build Source/Loader/Loader.csproj Source/Loader.Tests/Loader.Tests.csproj --configuration Release -p:EnableWindowsTargeting=true
          dotnet test Source/Loader.Tests/Loader.Tests.csproj --configuration Release --no-build -p:EnableWindowsTargeting=true
          dotnet sonarscanner end /d:sonar.login="${{ secrets.SONAR_TOKEN }}"

  sonar-server:
    name: SonarQube Server (C++)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build build-essential pkg-config libsqlite3-dev libssl-dev uuid-dev

      - name: Cache SonarQube scanner plugins
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: sonar-plugin-cache-${{ runner.os }}
          restore-keys: sonar-plugin-cache-${{ runner.os }}-

      - name: Configure CMake (generates compile_commands.json)
        run: cmake -B build -G Ninja -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - uses: SonarSource/sonarqube-scan-action@v7
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey=${{ vars.SONAR_SERVER_PROJECT_KEY }}
            -Dsonar.projectName=rekindled-server
            -Dsonar.sources=.
            -Dsonar.exclusions=Source/ThirdParty/**,Protobuf/**,build/**,Source/Loader/**,Source/Loader.Tests/**
            -Dsonar.cfamily.compile-commands=build/compile_commands.json
            -Dsonar.cfamily.threads=4
            -Dsonar.sourceEncoding=UTF-8
            -Dsonar.verbose=true
