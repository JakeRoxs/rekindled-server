name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version"
        required: true
        default: "1.0.0.0"
      version_postfix:
        description: "Version Postfix"
        required: true
        default: "-preview"

permissions:
  contents: read

env:
  # Path to the solution file relative to the root of the project.
  SOLUTION_FILE_PATH: ./intermediate/vs2022/ds3os.sln

  # Configuration type to build.
  # You can convert this to a build matrix if you need coverage of multiple configuration types.
  # https://docs.github.com/actions/learn-github-actions/managing-complex-workflows#using-a-build-matrix
  BUILD_CONFIGURATION: Release

  # Version number being build.
  VERSION_NUMBER_POSTFIX: ${{ github.event.inputs.version_postfix }}

  # Version number being build.
  VERSION_NUMBER: ${{ github.event.inputs.version }}

jobs:
  check:
    name: Determine whether CI should run
    runs-on: ubuntu-latest
    outputs:
      skipped: ${{ steps.determine.outputs.skipped }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Determine whether CI should run
        id: determine
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_SHA=${{ github.event.pull_request.base.sha }}
            HEAD_SHA=${{ github.event.pull_request.head.sha }}
            BRANCH=${{ github.event.pull_request.head.ref }}
          else
            BASE_SHA=${{ github.event.before }}
            HEAD_SHA=${{ github.sha }}
            BRANCH=${GITHUB_REF_NAME}
          fi

          if [ -z "$BASE_SHA" ] || [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ]; then
            echo "::notice::No base commit available; running CI."
            echo "skipped=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Comparing $BASE_SHA..$HEAD_SHA"

          if ! CHANGED=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA"); then
            echo "::warning::git diff failed; running CI by default."
            echo "skipped=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          printf "Changed files:\n%s\n" "$CHANGED"

          real=0
          while IFS= read -r f; do
            if [[ "$f" == *.nix ]]; then
              real=1
              break
            fi

            case "$f" in
              .github/workflows/ci.yml)
                real=1
                break
                ;;
              CMakeLists.txt)
                real=1
                break
                ;;
              Source/*)
                real=1
                break
                ;;
              Protobuf/*)
                real=1
                break
                ;;
              Resources/*)
                real=1
                break
                ;;
              Tools/*)
                real=1
                break
                ;;
              *)
                continue
                ;;
            esac
          done < <(printf '%s\n' "$CHANGED")

          if [ "$real" -eq 0 ]; then
            if [ -z "${GITHUB_TOKEN:-}" ]; then
              echo "::notice::GITHUB_TOKEN is unavailable; forcing CI to run (safe default)."
              real=1
            else
              prev_conclusion=$(curl -sSfL -H "Accept: application/vnd.github+json" -H "Authorization: Bearer $GITHUB_TOKEN" "https://api.github.com/repos/$GITHUB_REPOSITORY/actions/runs?branch=$BRANCH&per_page=5" 2>/dev/null | python -c 'import json,sys; runs=json.load(sys.stdin).get("workflow_runs", []); current=int(sys.argv[1]); print(next((r.get("conclusion", "") for r in runs if r.get("id") != current and r.get("status") == "completed"), ""))' "$GITHUB_RUN_ID" 2>/dev/null || true)

              if [ -n "$prev_conclusion" ] && [ "$prev_conclusion" != "success" ]; then
                echo "::notice::Previous CI run on branch '$BRANCH' concluded as '$prev_conclusion'; running CI."
                real=1
              fi
            fi
          fi

          if [ "$real" -eq 0 ]; then
            echo "::notice::Skipping CI: only docs/workflow files changed and previous run succeeded."
            echo "skipped=true" >> "$GITHUB_OUTPUT"
            echo "::notice::CI decision: skipped=true (no build-relevant changes detected)"
          else
            echo "skipped=false" >> "$GITHUB_OUTPUT"
            echo "::notice::CI decision: skipped=false (build-relevant changes detected or previous run failed)"
          fi

  build:
    name: Build (matrix)
    needs: check
    if: needs.check.outputs.skipped != 'true'
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-ninja
            os: windows-latest
            generator: Ninja
          - name: linux-ninja
            os: ubuntu-latest
            generator: Ninja
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Cache build artifacts
        if: matrix.name == 'windows-ninja' || matrix.name == 'linux-ninja'
        uses: actions/cache@v5
        with:
          path: |
            **/intermediate
            ~/.nuget/packages
          key: ${{ runner.os }}-build-${{ github.repository }}-${{ hashFiles('**/*.csproj','**/CMakeLists.txt') }}
          restore-keys: |
            ${{ runner.os }}-build-

      - name: Clean stale CMake cache (Linux)
        if: matrix.name == 'linux-ninja'
        shell: bash
        run: |
          rm -f intermediate/make/CMakeCache.txt
          rm -rf intermediate/make/CMakeFiles

      - name: Clean stale CMake cache (Windows)
        if: matrix.name == 'windows-ninja'
        shell: cmd
        run: |
          if exist intermediate\vs2022\CMakeCache.txt del /f /q intermediate\vs2022\CMakeCache.txt
          if exist intermediate\vs2022\CMakeFiles rmdir /s /q intermediate\vs2022\CMakeFiles

      - name: Generate build files (Windows)
        if: matrix.name == 'windows-ninja'
        shell: cmd
        env:
          GENERATOR: Ninja
        run: |
          for /f "delims=" %%V in ('"%ProgramFiles(x86)%\Microsoft Visual Studio\Installer\vswhere.exe" -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath') do set "VS_INSTALL_DIR=%%V"
          if defined VS_INSTALL_DIR (
            echo Using VSINSTALLDIR=%%VS_INSTALL_DIR%%
            call "%%VS_INSTALL_DIR%%\VC\Auxiliary\Build\vcvars64.bat"
          ) else (
            echo VSInstallDir not found; trying default path
            if exist "%ProgramFiles(x86)%\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat" (
              call "%ProgramFiles(x86)%\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
            ) else (
              echo Warning: vcvars64.bat not found in default location. Proceeding without it.
            )
          )
          cd "%GITHUB_WORKSPACE%\Tools"
          "%GITHUB_WORKSPACE%\Tools\generate_vs2022.bat"

      - name: Report dependency fetch status (Windows)
        if: matrix.name == 'windows-ninja'
        shell: cmd
        run: |
          if exist intermediate\vs2022\dependency-fetch-status.txt (
            type intermediate\vs2022\dependency-fetch-status.txt
          ) else (
            echo "(dependency-fetch-status.txt not found)"
          )

      - name: Report dependency fetch status (Linux)
        if: matrix.name == 'linux-ninja'
        shell: bash
        run: |
          status_file="${{ github.workspace }}/intermediate/make/dependency-fetch-status.txt"
          if [[ -f "$status_file" ]]; then
            cat "$status_file"
          else
            echo "(dependency-fetch-status.txt not found)"
          fi

      - name: Add MSBuild to PATH
        if: matrix.name == 'windows-ninja'
        uses: microsoft/setup-msbuild@v3

      - name: Restore NuGet packages (Windows)
        if: matrix.name == 'windows-ninja'
        working-directory: ${{github.workspace}}
        run: dotnet restore ${{env.SOLUTION_FILE_PATH}}

      - name: Build on Windows (Ninja)
        if: matrix.name == 'windows-ninja'
        working-directory: ${{github.workspace}}/intermediate/vs2022
        shell: cmd
        run: |
          for /f "delims=" %%V in ('"%ProgramFiles(x86)%\Microsoft Visual Studio\Installer\vswhere.exe" -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath') do set "VS_INSTALL_DIR=%%V"
          if defined VS_INSTALL_DIR (
            echo Using VSINSTALLDIR=%%VS_INSTALL_DIR%%
            call "%%VS_INSTALL_DIR%%\VC\Auxiliary\Build\vcvars64.bat"
          ) else (
            echo VSInstallDir not found; trying default path
            if exist "%ProgramFiles(x86)%\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat" (
              call "%ProgramFiles(x86)%\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
            ) else (
              echo Warning: vcvars64.bat not found in default location. Proceeding without it.
            )
          )
          if defined NUMBER_OF_PROCESSORS (
            set /A JOBS=%NUMBER_OF_PROCESSORS%
          ) else (
            set /A JOBS=0
          )
          if %JOBS% GTR 0 (
            ninja -j %JOBS%
          ) else (
            ninja
          )

      - name: Install required development packages (Linux)
        if: matrix.name == 'linux-ninja'
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build libssl-dev zlib1g-dev libsqlite3-dev pkg-config
          sudo apt-get install -y uuid-dev || sudo apt-get install -y libuuid-dev

      - name: Generate Solution (Linux)
        if: matrix.name == 'linux-ninja'
        shell: bash
        run: |
          cd "${{ github.workspace }}/Tools"
          GENERATOR=Ninja "${{ github.workspace }}/Tools/generate_make_release.sh"

      - name: Build on Linux (Ninja)
        if: matrix.name == 'linux-ninja'
        working-directory: ${{github.workspace}}/intermediate/make
        run: ninja -j$(nproc)

      - name: Package Release (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          cd "${{ github.workspace }}"
          ./Tools/generate_package_windows.bat

      - name: Package Release (Linux)
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          cd "${{ github.workspace }}"
          "${{ github.workspace }}/Tools/generate_package_linux.sh"

      - name: Zip Release
        uses: vimtor/action-zip@v1
        with:
          files: DS3OS/
          dest: ${{ matrix.platform }}-${{ env.VERSION_NUMBER }}${{ env.VERSION_NUMBER_POSTFIX }}.zip

      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          path: ${{ matrix.platform }}-${{ env.VERSION_NUMBER }}${{ env.VERSION_NUMBER_POSTFIX }}.zip
          name: ${{ matrix.platform }}

  build-docker:
    name: Build Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        image:
          - context: ./Source/MasterServer
            file: ./Source/MasterServer/Dockerfile
            tag: dsos-master:latest
          - context: .
            file: ./DarkSouls3.Dockerfile
            tag: ds3os:latest
          - context: .
            file: ./DarkSouls2.Dockerfile
            tag: ds2os:latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push ${{ matrix.image.tag }}
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.image.context }}
          file: ${{ matrix.image.file }}
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image.tag }}
          # Enable BuildKit cache storage between workflow runs
          cache-from: type=gha
          cache-to: type=gha,mode=max

  make-release:
    name: Make Release
    needs: [build, build-docker]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download windows artifact
        id: download-windows-artifact
        uses: actions/download-artifact@v8
        with:
          name: windows

      - name: Download linux artifact
        id: download-linux-artifact
        uses: actions/download-artifact@v8
        with:
          name: linux

      - name: Display artifacts
        run: ls -R

      - name: Publish release via GitHub CLI
        env:
          VERSION_TAG: v${{ env.VERSION_NUMBER }}${{ env.VERSION_NUMBER_POSTFIX }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "$VERSION_TAG" >/dev/null 2>&1; then
            echo "Release $VERSION_TAG already exists, will upload assets."
          else
            gh release create "$VERSION_TAG" \
              --title "Release $VERSION_TAG" \
              --notes "Preview build" \
              --draft=false --prerelease=true
          fi
          gh release upload "$VERSION_TAG" \
            windows-${{ env.VERSION_NUMBER }}${{ env.VERSION_NUMBER_POSTFIX }}.zip \
            linux-${{ env.VERSION_NUMBER }}${{ env.VERSION_NUMBER_POSTFIX }}.zip
