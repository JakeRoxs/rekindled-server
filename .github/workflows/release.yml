name: Release

on: 
  workflow_dispatch:
    inputs:
      version:
        description: 'Version'     
        required: true
        default: '1.0.0.0'
      version_postfix:
        description: 'Version Postfix'     
        required: true
        default: '-preview'

env:
  # Path to the solution file relative to the root of the project.
  SOLUTION_FILE_PATH: ./intermediate/vs2022/ds3os.sln

  # Configuration type to build.
  # You can convert this to a build matrix if you need coverage of multiple configuration types.
  # https://docs.github.com/actions/learn-github-actions/managing-complex-workflows#using-a-build-matrix
  BUILD_CONFIGURATION: Release

  # Version number being build.
  VERSION_NUMBER_POSTFIX: ${{ github.event.inputs.version_postfix }}

  # Version number being build.
  VERSION_NUMBER: ${{ github.event.inputs.version }}

jobs:
  build:
    name: Build (matrix)
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      packages: read
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: windows
          - os: ubuntu-latest
            platform: linux
    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
      with:
        submodules: recursive

    - name: Cache build artifacts
      uses: actions/cache@v5
      with:
        path: |
          **/intermediate
          ~/.nuget/packages
        key: ${{ runner.os }}-release-${{ hashFiles('**/*.csproj','**/CMakeLists.txt') }}
        restore-keys: |
          ${{ runner.os }}-release-

    - name: Generate Solution (Windows)
      if: matrix.platform == 'windows'
      shell: cmd
      run: |
        cd "%GITHUB_WORKSPACE%\Tools"
        "%GITHUB_WORKSPACE%\Tools\generate_vs2022.bat"

    - name: Generate Solution (Linux)
      if: matrix.platform == 'linux'
      shell: bash
      run: |
        cd "${{ github.workspace }}/Tools"
        "${{ github.workspace }}/Tools/generate_make_release.sh"

    - name: Set up environment
      if: matrix.platform == 'windows'
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 5.0.x

    - name: Add MSBuild to PATH
      if: matrix.platform == 'windows'
      uses: microsoft/setup-msbuild@v2

    - name: Restore Dependencies (Windows)
      if: matrix.platform == 'windows'
      working-directory: ${{github.workspace}}
      run: msbuild /m /p:Configuration=${{env.BUILD_CONFIGURATION}} ${{env.SOLUTION_FILE_PATH}} /t:Restore

    - name: Build Windows
      if: matrix.platform == 'windows'
      shell: pwsh
      run: |
        dotnet publish ./Source/Loader/Loader.csproj `
        -r win-x64 -c Release `
        --output ${{github.workspace}}/Bin/Loader/Package/ `
        /p:PublishSingleFile=true /p:IncludeNativeLibrariesForSelfExtract=true `
        /p:Version=${{env.VERSION_NUMBER}}${{env.VERSION_NUMBER_POSTFIX}} `
        /p:FileVersion=${{env.VERSION_NUMBER}} /p:AssemblyVersion=${{env.VERSION_NUMBER}}
        msbuild /m /p:Configuration=${{env.BUILD_CONFIGURATION}} ${{env.SOLUTION_FILE_PATH}} /t:Build

    - name: Install uuid development package
      if: matrix.platform == 'linux'
      run: |
        set -euxo pipefail
        sudo apt-get update
        sudo apt-get install -y uuid-dev || sudo apt-get install -y libuuid-dev

    - name: Build Linux
      if: matrix.platform == 'linux'
      working-directory: ${{github.workspace}}/intermediate/make
      run: make -j$(nproc)

    - name: Package Release (Windows)
      if: matrix.platform == 'windows'
      shell: pwsh
      run: |
        cd "${{ github.workspace }}"
        ./Tools/generate_package_windows.bat

    - name: Package Release (Linux)
      if: matrix.platform == 'linux'
      shell: bash
      run: |
        cd "${{ github.workspace }}"
        "${{ github.workspace }}/Tools/generate_package_linux.sh"

    - name: Zip Release
      uses: vimtor/action-zip@v1
      with:
        files: DS3OS/
        dest: ${{ matrix.platform }}-${{ env.VERSION_NUMBER }}${{ env.VERSION_NUMBER_POSTFIX }}.zip

    - name: Upload Artifact
      uses: actions/upload-artifact@v7
      with:
        path: ${{ matrix.platform }}-${{ env.VERSION_NUMBER }}${{ env.VERSION_NUMBER_POSTFIX }}.zip
        name: ${{ matrix.platform }}

  build-docker:
    name: Build Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        image:
          - context: ./Source/MasterServer
            file: ./Source/MasterServer/Dockerfile
            tag: ds3os-master:latest
          - context: .
            file: ./DarkSouls3.Dockerfile
            tag: ds3os:latest
          - context: .
            file: ./DarkSouls2.Dockerfile
            tag: ds2os:latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
      with:
        submodules: recursive

    - name: Login to DockerHub
      uses: docker/login-action@v4 
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Build and push ${{ matrix.image.tag }}
      uses: docker/build-push-action@v7
      with:
        context: ${{ matrix.image.context }}
        file: ${{ matrix.image.file }}
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image.tag }}
        no-cache: ${{ matrix.image.tag != 'ds3os-master:latest' }}
                                  
  make-release:
    name: Make Release
    needs: [ build, build-docker ]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Download windows artifact
      id: download-windows-artifact
      uses: actions/download-artifact@v8
      with:
        name: windows

    - name: Download linux artifact
      id: download-linux-artifact
      uses: actions/download-artifact@v8
      with:
        name: linux

    - name: Display artifacts
      run: ls -R

    - name: Create GitHub release
      uses: softprops/action-gh-release@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: v${{ env.VERSION_NUMBER }}${{ env.VERSION_NUMBER_POSTFIX }}
        name: Release v${{ env.VERSION_NUMBER }}${{ env.VERSION_NUMBER_POSTFIX }}
        body: Preview build, not officially supported yet.
        draft: false
        prerelease: true

    - name: Upload Windows ZIP
      uses: softprops/action-gh-release@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: v${{ env.VERSION_NUMBER }}${{ env.VERSION_NUMBER_POSTFIX }}
        files: windows-${{ env.VERSION_NUMBER }}${{ env.VERSION_NUMBER_POSTFIX }}.zip

    - name: Upload Linux ZIP
      uses: softprops/action-gh-release@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: v${{ env.VERSION_NUMBER }}${{ env.VERSION_NUMBER_POSTFIX }}
        files: linux-${{ env.VERSION_NUMBER }}${{ env.VERSION_NUMBER_POSTFIX }}.zip
        
